.hero{

position:relative;

align-items:center;

justify-content:space-between;

.right{

/* ===== Typography ===== */

.title{

font-weight:900;

}

}

.title .fa{
display:block;
color:#1f2140;
}

.subtitle{
font-size:20px;
line-height:2;
color:#6a6d85;
font-weight:500;
margin-bottom:42px;
max-width:720px;
}

/* ===== Feature Cards ===== */

.features{
display:flex;
gap:18px;
flex-wrap:wrap;
margin-bottom:42px;
}

.feature{
width:150px;
height:138px;
background:rgba(255,255,255,.78);

flex-direction:column;
align-items:center;
justify-content:center;

box-shadow:
0 18px 35px rgba(86,42,200,.08),
0 2px 8px rgba(0,0,0,.03);

}

.feature:hover{
transform:translateY(-8px);

0 26px 48px rgba(115,52,255,.16),
0 8px 18px rgba(0,0,0,.06);
}

.icon{
width:64px;
height:64px;
border-radius:18px;

align-items:center;
justify-content:center;

color:#8a2dff;

0 8px 18px rgba(138,45,255,.12);
}

.feature h4{
font-size:15px;
font-weight:800;
color:#535774;
}

.feature .sub{
font-size:12px;
color:#8b8fa8;

}

/* نوت‌های موزیک */

.music-note{

position:absolute;

width:54px;

height:54px;

border-radius:18px;

background:#fff;

display:flex;

align-items:center;

justify-content:center;

font-size:22px;

color:#9a37ff;

box-shadow:

0 12px 35px rgba(105,55,220,.14);

z-index:6;

animation:floatNote 4s ease-in-out infinite;

}

.note1{

top:70px;

right:40px;

}

.note2{

left:20px;

top:200px;

animation-delay:1s;

}

.note3{

right:10px;

bottom:80px;

animation-delay:2s;

}

.note4{

left:80px;

bottom:20px;

animation-delay:3s;

}

@keyframes float{

0%{

transform:translateY(0px);

}

50%{

transform:translateY(-10px);

}

100%{

transform:translateY(0px);

}

}

@keyframes glow{

0%{

transform:scale(1);

opacity:.85;

}

50%{

transform:scale(1.05);

opacity:1;

}

100%{

transform:scale(1);

opacity:.85;

}

}

@keyframes floatNote{

0%{

transform:translateY(0px);

}

50%{

transform:translateY(-12px);

}

100%{

transform:translateY(0px);

}

}
/* ===========================
   Floating Shapes
=========================== */

.hero .shape{

position:absolute;

border-radius:50%;

pointer-events:none;

filter:blur(3px);

z-index:0;

}

.hero .shape1{

width:140px;

height:140px;

background:rgba(181,72,255,.10);

right:140px;

top:40px;

}

.hero .shape2{

width:90px;

height:90px;

background:rgba(255,126,203,.14);

right:60px;

bottom:120px;

}

.hero .shape3{

width:70px;

height:70px;

background:rgba(111,64,255,.08);

left:55%;

top:30px;

}

.hero .shape4{

width:130px;

height:130px;

background:rgba(255,255,255,.45);

left:-40px;

bottom:-40px;

filter:blur(12px);

}

/* ===========================
   Image Hover
=========================== */

.artist{

transition:.45s;

}

.hero:hover .artist{

transform:

translateY(-8px)

scale(1.02);

}

/* ===========================
   Feature Hover
=========================== */

.feature:hover .icon{

transform:scale(1.12);

background:

linear-gradient(135deg,#7f37ff,#b95eff);

color:#fff;

}

/* ===========================
   Button Shine
=========================== */

.mainBtn{

overflow:hidden;

position:relative;

}

.mainBtn::before{

content:"";

position:absolute;

left:-120px;

top:0;

width:70px;

height:100%;

background:

rgba(255,255,255,.45);

transform:skew(-20deg);

transition:.8s;

}

.mainBtn:hover::before{

left:120%;

}

/* ===========================
   Responsive
=========================== */
